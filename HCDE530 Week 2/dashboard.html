<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HCDE 530 — Research Responses Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e2e0da;
      --text: #1a1917;
      --muted: #6b6860;
      --accent-ux-researcher: #4f46e5;
      --accent-ux-designer: #0891b2;
      --accent-product-manager: #059669;
      --accent-content-strategist: #d97706;
      --accent-ux-researcher-bg: #eef2ff;
      --accent-ux-designer-bg: #ecfeff;
      --accent-product-manager-bg: #ecfdf5;
      --accent-content-strategist-bg: #fffbeb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
    }

    header h1 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .stat-card[data-role="all"]::before { background: #94928d; }
    .stat-card[data-role="UX Researcher"]::before { background: var(--accent-ux-researcher); }
    .stat-card[data-role="UX Designer"]::before { background: var(--accent-ux-designer); }
    .stat-card[data-role="Product Manager"]::before { background: var(--accent-product-manager); }
    .stat-card[data-role="Content Strategist"]::before { background: var(--accent-content-strategist); }

    .stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
    .stat-card.active { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-1px); }
    .stat-card.active[data-role="UX Researcher"] { background: var(--accent-ux-researcher-bg); border-color: var(--accent-ux-researcher); }
    .stat-card.active[data-role="UX Designer"] { background: var(--accent-ux-designer-bg); border-color: var(--accent-ux-designer); }
    .stat-card.active[data-role="Product Manager"] { background: var(--accent-product-manager-bg); border-color: var(--accent-product-manager); }
    .stat-card.active[data-role="Content Strategist"] { background: var(--accent-content-strategist-bg); border-color: var(--accent-content-strategist); }
    .stat-card.active[data-role="all"] { background: #f5f4f0; border-color: #94928d; }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      margin: 6px 0 2px;
    }

    .stat-sub {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Bar chart */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .chart-section h2 {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    .bar-chart { display: flex; flex-direction: column; gap: 14px; }

    .bar-row { display: flex; align-items: center; gap: 12px; }

    .bar-name {
      width: 160px;
      font-size: 0.875rem;
      flex-shrink: 0;
      color: var(--text);
    }

    .bar-track {
      flex: 1;
      height: 20px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .bar-count {
      width: 28px;
      text-align: right;
      font-size: 0.875rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .toolbar h2 {
      font-size: 1rem;
      font-weight: 700;
    }

    .search-box {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      background: var(--surface);
      width: 240px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box:focus { border-color: #94928d; }

    /* Results count */
    .results-info {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Response cards */
    .cards { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
      transition: box-shadow 0.15s;
      display: flex;
      gap: 20px;
    }

    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

    .card-meta {
      flex-shrink: 0;
      width: 130px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pid {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .role-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .role-badge.ux-researcher { background: var(--accent-ux-researcher-bg); color: var(--accent-ux-researcher); }
    .role-badge.ux-designer { background: var(--accent-ux-designer-bg); color: var(--accent-ux-designer); }
    .role-badge.product-manager { background: var(--accent-product-manager-bg); color: var(--accent-product-manager); }
    .role-badge.content-strategist { background: var(--accent-content-strategist-bg); color: var(--accent-content-strategist); }

    .card-body {
      flex: 1;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text);
    }

    .card-body mark {
      background: #fde68a;
      border-radius: 2px;
      padding: 0 1px;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .card { flex-direction: column; gap: 10px; }
      .card-meta { width: auto; flex-direction: row; align-items: center; }
      .bar-name { width: 120px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>HCDE 530 — Research Responses</h1>
  <p>demo_responses.csv &nbsp;·&nbsp; 25 participants &nbsp;·&nbsp; 4 roles</p>
</header>

<div class="container">

  <!-- Stats / filter cards -->
  <div class="stats">
    <div class="stat-card active" data-role="all" onclick="setFilter('all')">
      <div class="stat-label">All Participants</div>
      <div class="stat-number" id="count-all">25</div>
      <div class="stat-sub">responses</div>
    </div>
    <div class="stat-card" data-role="UX Researcher" onclick="setFilter('UX Researcher')">
      <div class="stat-label">UX Researcher</div>
      <div class="stat-number" id="count-ux-researcher">—</div>
      <div class="stat-sub">participants</div>
    </div>
    <div class="stat-card" data-role="UX Designer" onclick="setFilter('UX Designer')">
      <div class="stat-label">UX Designer</div>
      <div class="stat-number" id="count-ux-designer">—</div>
      <div class="stat-sub">participants</div>
    </div>
    <div class="stat-card" data-role="Product Manager" onclick="setFilter('Product Manager')">
      <div class="stat-label">Product Manager</div>
      <div class="stat-number" id="count-product-manager">—</div>
      <div class="stat-sub">participants</div>
    </div>
    <div class="stat-card" data-role="Content Strategist" onclick="setFilter('Content Strategist')">
      <div class="stat-label">Content Strategist</div>
      <div class="stat-number" id="count-content-strategist">—</div>
      <div class="stat-sub">participants</div>
    </div>
  </div>

  <!-- Bar chart -->
  <div class="chart-section">
    <h2>Distribution by Role</h2>
    <div class="bar-chart" id="bar-chart"></div>
  </div>

  <!-- Response cards -->
  <div class="toolbar">
    <h2>Responses</h2>
    <input class="search-box" type="text" id="search" placeholder="Search responses…" oninput="render()" />
  </div>
  <div class="results-info" id="results-info"></div>
  <div class="cards" id="cards"></div>

</div>

<script>
  const data = [
    { id: "P01", role: "UX Researcher", response: "I usually start by reviewing whatever documentation exists, but honestly most of the time there isn't much. I end up doing a lot of stakeholder interviews just to figure out what the product is actually supposed to do." },
    { id: "P02", role: "UX Designer", response: "The hardest part is getting engineers to understand why we need more than two weeks for discovery. They always want to jump straight to wireframes. I've started framing research as risk reduction and that helps a little." },
    { id: "P03", role: "Product Manager", response: "We run two-week sprints and research keeps getting squeezed into the first three days. By the time we have findings, the design decisions are already made. I don't know how to fix that." },
    { id: "P04", role: "UX Researcher", response: "Recruiting is always the bottleneck. We spend more time finding participants than actually running sessions. I wish we had a panel we could pull from instead of starting from scratch every time." },
    { id: "P05", role: "Content Strategist", response: "Nobody invites me into the research phase. I find out what users said in the readout and by then the IA is already locked. The language problems surface in usability testing three months later." },
    { id: "P06", role: "UX Designer", response: "I've started doing five-minute hallway tests with anyone I can find. It's not rigorous but it's faster than waiting for a formal study to get scheduled and approved." },
    { id: "P07", role: "UX Researcher", response: "The synthesis step is where we lose people. Everyone attends the sessions but nobody wants to sit through two days of affinity mapping. I've tried doing it async with Miro but participation drops off." },
    { id: "P08", role: "Product Manager", response: "My biggest frustration is that research findings don't translate into decisions. We get a deck with quotes and themes and then everyone nods and goes back to doing what they planned to do anyway." },
    { id: "P09", role: "UX Designer", response: "I find it really hard to push back when someone senior says they already know what users want. Even when I have data that contradicts them." },
    { id: "P10", role: "UX Researcher", response: "Remote sessions have actually improved our geographic diversity. We used to only talk to people in Seattle. Now we regularly include participants from smaller cities and that's changed some of our assumptions." },
    { id: "P11", role: "Content Strategist", response: "I've been trying to introduce plain language principles but the legal team always pushes back. They want specific wording that users consistently misread in testing. It's a constant negotiation." },
    { id: "P12", role: "Product Manager", response: "We don't have a dedicated researcher on my team so I end up doing interviews myself. I'm not sure I'm doing them well but it's better than not doing them at all." },
    { id: "P13", role: "UX Designer", response: "The gap between what users say they do and what they actually do is real. I had a participant tell me they always read the confirmation email and then in the diary study we ran they never opened a single one." },
    { id: "P14", role: "UX Researcher", response: "I'm spending more time writing reports that nobody reads than actually doing research. I've been experimenting with shorter formats, like a one-page brief, and that gets more engagement." },
    { id: "P15", role: "Product Manager", response: "Our design system has made things more consistent but it's also made some teams less willing to question patterns that don't actually work for their users. Convention becomes a crutch." },
    { id: "P16", role: "UX Designer", response: "I've started including a confidence rating in my recommendations, like this is high confidence from multiple sources versus this is directional from a single session. It's changed how people receive the findings." },
    { id: "P17", role: "UX Researcher", response: "Accessibility keeps getting treated as a compliance checklist instead of a design constraint. I've had the most success when I can get an assistive technology user into a session early because seeing it is harder to argue with than reading about it." },
    { id: "P18", role: "Content Strategist", response: "Error messages are the last thing anyone thinks about and the first thing users notice when something goes wrong. I've been trying to get them into scope earlier but they always end up being a handoff item." },
    { id: "P19", role: "UX Designer", response: "I struggle with knowing when I have enough data. There's always pressure to do one more round but at some point you're validating what you already know." },
    { id: "P20", role: "Product Manager", response: "The most useful thing research has done for us is help us stop building things. We killed two features last quarter based on findings and that felt like a win even though it's hard to show in a metric." },
    { id: "P21", role: "UX Researcher", response: "We've been using AI to help with transcript analysis and it speeds things up but I always do a pass myself because it flattens nuance. It's good at finding patterns and bad at knowing which ones matter." },
    { id: "P22", role: "UX Designer", response: "Onboarding is where our product falls apart and everyone knows it but there's no owner. Product thinks it's design, design thinks it's content, content thinks it's engineering. The user just bounces." },
    { id: "P23", role: "Content Strategist", response: "I've been pushing for a terminology audit across the product for two years. Different parts of the app use different words for the same thing and users notice even if they can't articulate why." },
    { id: "P24", role: "UX Researcher", response: "The best sessions I run are the ones where I say almost nothing. The worst are when I'm trying to cover too many topics and I end up steering instead of listening." },
    { id: "P25", role: "Product Manager", response: "We did a diary study last year and the data was incredible but we've never had the budget or time to do another one. I think longitudinal research is undersold in product teams." },
  ];

  const ROLE_COLORS = {
    "UX Researcher": { fill: "#4f46e5", cls: "ux-researcher" },
    "UX Designer": { fill: "#0891b2", cls: "ux-designer" },
    "Product Manager": { fill: "#059669", cls: "product-manager" },
    "Content Strategist": { fill: "#d97706", cls: "content-strategist" },
  };

  let activeFilter = "all";

  // Count per role
  const roleCounts = {};
  data.forEach(d => { roleCounts[d.role] = (roleCounts[d.role] || 0) + 1; });
  const maxCount = Math.max(...Object.values(roleCounts));

  // Fill stat counts
  document.getElementById("count-ux-researcher").textContent = roleCounts["UX Researcher"] || 0;
  document.getElementById("count-ux-designer").textContent = roleCounts["UX Designer"] || 0;
  document.getElementById("count-product-manager").textContent = roleCounts["Product Manager"] || 0;
  document.getElementById("count-content-strategist").textContent = roleCounts["Content Strategist"] || 0;

  // Bar chart
  const chartEl = document.getElementById("bar-chart");
  Object.entries(roleCounts).forEach(([role, count]) => {
    const pct = (count / maxCount) * 100;
    const color = ROLE_COLORS[role]?.fill || "#94928d";
    chartEl.innerHTML += `
      <div class="bar-row">
        <div class="bar-name">${role}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="bar-count">${count}</div>
      </div>`;
  });

  function setFilter(role) {
    activeFilter = role;
    document.querySelectorAll(".stat-card").forEach(el => {
      el.classList.toggle("active", el.dataset.role === role);
    });
    render();
  }

  function highlight(text, query) {
    if (!query) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return text.replace(new RegExp(`(${escaped})`, "gi"), "<mark>$1</mark>");
  }

  function roleCls(role) {
    return ROLE_COLORS[role]?.cls || "";
  }

  function render() {
    const query = document.getElementById("search").value.trim().toLowerCase();
    let filtered = data;
    if (activeFilter !== "all") filtered = filtered.filter(d => d.role === activeFilter);
    if (query) filtered = filtered.filter(d =>
      d.response.toLowerCase().includes(query) ||
      d.role.toLowerCase().includes(query) ||
      d.id.toLowerCase().includes(query)
    );

    const infoEl = document.getElementById("results-info");
    infoEl.textContent = filtered.length === data.length
      ? `Showing all ${filtered.length} responses`
      : `Showing ${filtered.length} of ${data.length} responses`;

    const cardsEl = document.getElementById("cards");
    if (filtered.length === 0) {
      cardsEl.innerHTML = `<div class="no-results">No responses match your search.</div>`;
      return;
    }

    cardsEl.innerHTML = filtered.map(d => `
      <div class="card">
        <div class="card-meta">
          <div class="pid">${d.id}</div>
          <span class="role-badge ${roleCls(d.role)}">${d.role}</span>
        </div>
        <div class="card-body">${highlight(d.response, document.getElementById("search").value.trim())}</div>
      </div>
    `).join("");
  }

  render();
</script>
</body>
</html>
