<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NASA APOD Random Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --card: #121a33;
      --text: #eaf0ff;
      --muted: #aebce4;
      --accent: #6ea8fe;
      --accent-hover: #8bb8ff;
      --border: #27345f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #172445, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    button {
      background: var(--accent);
      color: #0b1225;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .meta {
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .media {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #090f21;
      margin-bottom: 10px;
      max-height: 520px;
      object-fit: contain;
    }

    iframe.media {
      aspect-ratio: 16 / 9;
      min-height: 380px;
    }

    .explanation {
      line-height: 1.55;
      margin: 0;
      white-space: pre-wrap;
    }

    .status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    a { color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <div class="row">
      <h1>NASA APOD CSV Viewer</h1>
      <button id="nextButton" type="button" disabled>Next random APOD</button>
    </div>

    <article id="entry">
      <p class="meta">Loading CSV data...</p>
    </article>

    <p class="status" id="statusText"></p>
  </main>

  <script>
    const CSV_FILE = "./nasa_apod_results.csv";
    const REQUIRED_FIELDS = ["title", "date", "url", "media_type", "explanation"];
    const nextButton = document.getElementById("nextButton");
    const entry = document.getElementById("entry");
    const statusText = document.getElementById("statusText");
    let rows = [];
    let lastIndex = -1;

    function parseCsv(text) {
      const parsedRows = [];
      let row = [];
      let field = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === "\"") {
          if (inQuotes && next === "\"") {
            field += "\"";
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(field);
          field = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") {
            i += 1;
          }
          row.push(field);
          field = "";
          if (row.length > 1 || row[0] !== "") {
            parsedRows.push(row);
          }
          row = [];
          continue;
        }

        field += char;
      }

      if (field.length > 0 || row.length > 0) {
        row.push(field);
        parsedRows.push(row);
      }
      return parsedRows;
    }

    function toObjects(tableRows) {
      if (!tableRows.length) return [];
      const headers = tableRows[0].map((header) => header.trim());
      const objects = [];
      for (let i = 1; i < tableRows.length; i += 1) {
        const values = tableRows[i];
        const obj = {};
        headers.forEach((header, idx) => {
          obj[header] = values[idx] ?? "";
        });
        objects.push(obj);
      }
      return objects;
    }

    function randomIndex(length) {
      if (length <= 1) return 0;
      let idx = Math.floor(Math.random() * length);
      while (idx === lastIndex) {
        idx = Math.floor(Math.random() * length);
      }
      return idx;
    }

    function renderMedia(item) {
      const mediaType = (item.media_type || "").toLowerCase();
      const safeUrl = item.url || "";

      if (!safeUrl) {
        return "<p class=\"meta\">No media URL for this entry.</p>";
      }

      if (mediaType === "image") {
        return `<img class="media" src="${safeUrl}" alt="${item.title || "APOD image"}">`;
      }
      if (mediaType === "video") {
        return `<iframe class="media" src="${safeUrl}" title="APOD video" allowfullscreen></iframe>`;
      }
      return `<p class="meta">Media type: ${mediaType || "unknown"}<br><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">Open media URL</a></p>`;
    }

    function renderEntry(item, position, total) {
      entry.innerHTML = `
        <h2 class="title">${item.title || "Untitled APOD"}</h2>
        <p class="meta">${item.date || "Unknown date"} | ${item.media_type || "unknown media type"}</p>
        ${renderMedia(item)}
        <p class="explanation">${item.explanation || "No explanation provided."}</p>
        <p class="meta"><a href="${item.url || "#"}" target="_blank" rel="noopener noreferrer">Open source URL</a></p>
      `;
      statusText.textContent = `Showing ${position} of ${total} loaded entries`;
    }

    function showRandomEntry() {
      if (!rows.length) return;
      const idx = randomIndex(rows.length);
      lastIndex = idx;
      renderEntry(rows[idx], idx + 1, rows.length);
    }

    async function loadCsvAndRender() {
      try {
        const response = await fetch(CSV_FILE);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const text = await response.text();
        const table = parseCsv(text);
        const items = toObjects(table).filter((item) =>
          REQUIRED_FIELDS.every((field) => field in item)
        );

        if (!items.length) {
          throw new Error("CSV has no APOD rows");
        }

        rows = items;
        nextButton.disabled = false;
        showRandomEntry();
      } catch (error) {
        entry.innerHTML = `
          <p class="meta">Could not load <code>${CSV_FILE}</code>.</p>
          <p class="meta">Serve this folder first, for example:<br><code>cd "Week 4" && python3 -m http.server 8000</code></p>
        `;
        statusText.textContent = `Load error: ${error.message}`;
      }
    }

    nextButton.addEventListener("click", showRandomEntry);
    loadCsvAndRender();
  </script>
</body>
</html>
